<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>MyStore</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </nav>
    <div id="cart">🛒 <span id="cart-count">0</span></div>
</header>

<section class="hero">
    <h2>Welcome to My Store</h2>
    <p>Find the best products just for you</p>
</section>

<section class="products">

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Product 1</h3>
        <p>$10</p>
        <button onclick="addToCart('Product 1', 10)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Product 2</h3>
        <p>$15</p>
        <button onclick="addToCart('Product 2', 15)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Product 3</h3>
        <p>$20</p>
        <button onclick="addToCart('Product 3', 20)">Add to Cart</button>
    </div>

</section>

<footer>
    <p>© 2026 MyStore</p>
</footer>

<script src="script.js"></script>
</body>
</html>
